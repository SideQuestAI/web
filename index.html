<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SideQuestAI</title>
    <script>
      // GitHub Pages sometimes loads root path without #
      if (!location.hash) {
        location.replace(location.pathname + '#/');
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <!-- Vite injects the script automatically during build -->
  </body>
</html>
